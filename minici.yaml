job build:
  shell: |
    cabal build --ghc-options='-Werror -Wno-error=unused-imports'
    mkdir build
    cp $(cabal list-bin minici) build/minici
  artifact bin:
    path: build/minici

job test:
  uses:
    - build.bin
  shell:
    - EREBOS_TEST_TOOL='build/minici --test-output' erebos-tester --verbose
